name: first git 
on: 
  push: 
    branches: ['main']
jobs:
  run-app: 
    runs-on: self-hosted
    steps: 
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          cd /var/www/nodepro
          npm install
          npm install pm2 -g 
      - run: sudo pm2 start server.js --name kunj  
      
